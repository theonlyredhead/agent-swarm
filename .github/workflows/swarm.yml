name: Agent Swarm

on:
  repository_dispatch:
    types: [uat-failure]

jobs:
  swarm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run swarm
        run: node cli.js --org nation-management --status "agent pickup"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_NATION_TOKEN: ${{ secrets.GH_NATION_TOKEN }}
          GH_CORONATION_TOKEN: ${{ secrets.GH_CORONATION_TOKEN }}
          CLICKUP_API_KEY: ${{ secrets.CLICKUP_API_KEY }}
          CLICKUP_LIST_ID: ${{ secrets.CLICKUP_LIST_ID }}
